<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Compiler</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- FontAwesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />

  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/theme/dracula.min.css" />

  <style>
    body {
      background: linear-gradient(135deg, #2b1055, #7597de);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      color: #fff;
    }

    .compiler-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 800px;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .form-label {
      font-weight: 500;
      color: #eaeaea;
    }

    select, textarea, .CodeMirror {
      border-radius: 10px !important;
      overflow: hidden;
    }

    .CodeMirror {
      height: 300px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 15px;
      border-radius: 10px;
    }

    button {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 16px;
      transition: 0.3s;
      font-weight: 500;
    }

    button:hover {
      background: linear-gradient(90deg, #2575fc, #6a11cb);
      transform: scale(1.03);
    }

    .output-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="compiler-card">
    <h1><i class="fas fa-code"></i> Online Compiler</h1>
    <form method="POST" action="compile.php" id="compiler-form">
      <div class="mb-3">
        <label for="language" class="form-label"><i class="fas fa-language"></i> Select Language</label>
        <select id="language" name="language" class="form-select" required>
          <option value="c">C</option>
          <option value="cpp">C++</option>
          <option value="python">Python</option>
          <option value="java">Java</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="code" class="form-label"><i class="fas fa-edit"></i> Write Your Code</label>
        <textarea id="code" name="code"></textarea>
      </div>

      <button type="submit" class="btn w-100 text-white"><i class="fas fa-play"></i> Run Code</button>
    </form>

    <div id="output" class="output-box mt-4" style="display:none;"></div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/clike/clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.5/mode/python/python.min.js"></script>

  <script>
    // Initialize CodeMirror
    const editor = CodeMirror.fromTextArea(document.getElementById("code"), {
      lineNumbers: true,
      mode: "text/x-csrc",
      theme: "dracula",
    });

    // Change language mode
    document.getElementById("language").addEventListener("change", function () {
      const language = this.value;
      let mode = "text/x-csrc";
      if (language === "cpp") mode = "text/x-c++src";
      else if (language === "python") mode = "text/x-python";
      else if (language === "java") mode = "text/x-java";
      editor.setOption("mode", mode);
    });

    // AJAX form submission
    document.getElementById("compiler-form").addEventListener("submit", function (e) {
      e.preventDefault();
      const output = document.getElementById("output");
      output.style.display = "block";
      output.innerText = "⏳ Running code, please wait...";

      const formData = new FormData(this);
      formData.set("code", editor.getValue());

      fetch("compile.php", {
        method: "POST",
        body: formData,
      })
        .then((res) => res.text())
        .then((data) => {
          output.innerText = data;
        })
        .catch((err) => {
          output.innerText = "❌ Error: " + err.message;
        });
    });
  </script>
</body>
</html>
